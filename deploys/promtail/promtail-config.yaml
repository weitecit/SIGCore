server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://grafana.weitec.es:3500/loki/api/v1/push

scrape_configs:
  - job_name: stdout
    static_configs:
      - targets:
          - localhost
        labels:
          job: app
          __path__: /var/log/*.log

